<!doctype html>
<!--
  Open Graph image source (1200x630).
  Regenerate public/og.png with:
    chrome --headless=new --window-size=1200,630 --hide-scrollbars
           --virtual-time-budget=8000 --screenshot=public/og.png scripts/og.html
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@200..500&family=Instrument+Serif:ital@1&display=block"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }
      body {
        background-color: #06070a;
        background-image: radial-gradient(900px 540px at 50% -14%, #0b0d13, transparent 65%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Geist', system-ui, sans-serif;
        color: #e9eaee;
        position: relative;
      }
      .horizon {
        position: absolute;
        top: 232px;
        left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(235, 236, 240, 0.09) 22%,
          rgba(235, 236, 240, 0.09) 78%,
          transparent 100%
        );
      }
      svg {
        display: block;
        margin-bottom: 44px;
      }
      h1 {
        font-size: 84px;
        font-weight: 250;
        letter-spacing: -0.015em;
        line-height: 1;
      }
      p {
        font-family: 'Instrument Serif', Georgia, serif;
        font-style: italic;
        font-size: 30px;
        color: #aaa699;
        margin-top: 22px;
      }
    </style>
  </head>
  <body>
    <div class="horizon"></div>
    <svg viewBox="0 0 320 320" width="200" height="200">
      <g stroke="rgba(235,236,240,0.28)" stroke-width="1">
        <line x1="160" y1="6" x2="160" y2="14" />
        <line x1="160" y1="306" x2="160" y2="314" />
        <line x1="6" y1="160" x2="14" y2="160" />
        <line x1="306" y1="160" x2="314" y2="160" />
      </g>
      <circle cx="160" cy="160" r="140" fill="none" stroke="rgba(235,236,240,0.14)" stroke-width="1" />
      <circle
        cx="160"
        cy="160"
        r="104"
        fill="none"
        stroke="rgba(235,236,240,0.24)"
        stroke-width="1"
        stroke-linecap="round"
        stroke-dasharray="480 173.4"
        transform="rotate(-40 160 160)"
      />
      <circle cx="160" cy="160" r="68" fill="none" stroke="rgba(235,236,240,0.20)" stroke-width="1" stroke-dasharray="1 7" />
      <circle cx="160" cy="160" r="14" fill="rgba(222,217,204,0.05)" />
      <circle cx="160" cy="160" r="3.4" fill="#ded9cc" />
      <g transform="rotate(38 160 160)">
        <circle cx="160" cy="20" r="6" fill="rgba(222,217,204,0.18)" />
        <circle cx="160" cy="20" r="2.2" fill="#ded9cc" />
      </g>
    </svg>
    <h1>ThirdOcular</h1>
    <p>For the layer before the outcome.</p>
  </body>
</html>
